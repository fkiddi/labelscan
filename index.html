<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* CSS for a fallback "Loading" screen */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 999; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">Point camera at the oil label...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="sdsIcon" src="sds-button.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane position="0 0.6 0" width="1" height="0.4" color="#1a1a1a" opacity="0.9">
          <a-text value="SAE 5W-30\nAPI SP / ILSAC GF-6A" align="center" color="#FFD700" width="2"></a-text>
        </a-plane>

        <a-image 
          class="clickable"
          src="#sdsIcon" 
          position="0 -0.5 0.1" 
          height="0.3" width="0.3"
          onclick="window.open('https://yourbrand.com/sds-info.pdf', '_blank')">
        </a-image>

      </a-entity>
    </a-scene>
  </body>
</html>
