<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 999; font-family: sans-serif; font-size: 1.2rem;
        text-align: center; padding: 20px;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">Point camera at the oil label...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-entity id="oil-bottle-target" mindar-image-target="targetIndex: 0">
        
        <a-plane position="-0.7 0 0.1" width="0.6" height="0.8" color="#1a1a1a" opacity="0.9">
          <a-text value="SPECIFICATIONS" align="center" color="#FFD700" width="1.5" position="0 0.35 0.02"></a-text>
          <a-text value="• Full Synthetic\n• SAE 5W-30\n• API SP\n• ILSAC GF-6A" 
                  align="left" color="#FFFFFF" width="1.2" position="-0.25 0.05 0.02"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.7 0 0.1" width="0.7" height="1.0" color="#1a1a1a" opacity="0.9"
                 onclick="window.open('https://yourbrand.com/sds.pdf', '_blank')">
          
          <a-text value="SAFETY DATA" align="center" color="#FFD700" width="1.5" position="0 0.43 0.02"></a-text>
          
          <a-text value="If medical advice is needed, have product container or label at hand. Keep out of reach of children. Contains: (Benzenesulfonic acid, mono-C16-24-alkyl derivs., calcium salts) May produce an allergic reaction." 
                  align="center" 
                  color="#FFFFFF" 
                  width="0.6" 
                  position="0 0.05 0.02" 
                  wrap-count="25"></a-text>
          
          <a-plane position="0 -0.4 0.01" width="0.4" height="0.12" color="#FFD700">
            <a-text value="VIEW PDF" align="center" color="#000000" width="1.1" position="0 0 0.01"></a-text>
          </a-plane>
        </a-plane>

      </a-entity>
    </a-scene>

    <script>
      const overlay = document.querySelector('#scanning-overlay');
      const targetEntity = document.querySelector('#oil-bottle-target');

      targetEntity.addEventListener("targetFound", event => {
        console.log("Found!");
        overlay.style.display = "none";
      });

      targetEntity.addEventListener("targetLost", event => {
        console.log("Lost!");
        overlay.style.display = "flex";
      });
    </script>
  </body>
</html>
