<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* CSS for a fallback "Loading" screen */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 999; font-family: sans-serif;
      }
    </style>
  </head>

  <body>
    <div id="scanning-overlay">Point camera at the oil label...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <img id="sdsIcon" src="sds-button.png">
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-plane position="-0.7 0 0.1" width="0.6" height="0.8" color="#1a1a1a" opacity="0.8">
          <a-text value="SPECIFICATIONS" align="center" color="#FFD700" width="1.5" position="0 0.3 0"></a-text>
          <a-text value="• Full Synthetic\n• SAE 5W-30\n• API SP\n• ILSAC GF-6A\n• Dexos Gen 3" 
                  align="left" color="white" width="1.2" position="-0.25 0 0"></a-text>
        </a-plane>

        <a-plane class="clickable" position="0.7 0 0.1" width="0.6" height="0.8" color="#1a1a1a" opacity="0.8"
                 onclick="window.open('https://yourbrand.com/sds.pdf', '_blank')">
          <a-text value="SAFETY DATA (SDS)" align="center" color="#FFD700" width="1.5" position="0 0.3 0"></a-text>
          <a-text value="CAUTION:\nAvoid skin contact.\nKeep away from heat.\nClick to view full\nPDF safety sheet." 
                  align="center" color="white" width="1.2" position="0 -0.05 0"></a-text>
          
          <a-plane position="0 -0.3 0.01" width="0.4" height="0.1" color="#FFD700">
            <a-text value="VIEW PDF" align="center" color="black" width="1"></a-text>
          </a-plane>
        </a-plane>

      </a-entity>
    </a-scene>
  </body>
</html>
