<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* CSS for a fallback "Loading" screen */
      #scanning-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7); color: white;
        display: flex; align-items: center; justify-content: center;
        z-index: 999; font-family: sans-serif;
      }
    </style>
  </head>

 <body>
    <div id="scanning-overlay">Point camera at the oil label...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #scanning-overlay;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <a-entity id="example-target" mindar-image-target="targetIndex: 0">
        
        <a-plane position="-1.2 0 0.1" width="0.8" height="1.0" color="#1a1a1a" opacity="0.9">
          <a-text value="SPECIFICATIONS" align="center" color="#FFD700" width="1.8" position="0 0.4 0"></a-text>
          <a-text value="• Full Synthetic\n• SAE 5W-30\n• API SP\n• ILSAC GF-6A" 
                  align="left" color="white" width="1.5" position="-0.35 0 0"></a-text>
        </a-plane>

        <a-plane class="clickable" position="1.2 0 0.1" width="0.8" height="1.0" color="#1a1a1a" opacity="0.9"
                 onclick="window.open('https://yourbrand.com/sds.pdf', '_blank')">
          <a-text value="SAFETY DATA" align="center" color="#FFD700" width="1.8" position="0 0.4 0"></a-text>
          <a-text value="CAUTION:\nAvoid contact.\nKeep away from heat." 
                  align="center" color="white" width="1.5" position="0 0.05 0"></a-text>
          
          <a-plane position="0 -0.35 0.01" width="0.5" height="0.15" color="#FFD700">
            <a-text value="VIEW PDF" align="center" color="black" width="1.2"></a-text>
          </a-plane>
        </a-plane>

      </a-entity>
    </a-scene>

    <script>
      // Script to handle the Overlay visibility
      const sceneEl = document.querySelector('a-scene');
      const overlay = document.querySelector('#scanning-overlay');
      const exampleTarget = document.querySelector('#example-target');

      // When the camera "locks" onto the label
      exampleTarget.addEventListener("targetFound", event => {
        console.log("Target found");
        overlay.style.display = "none"; // Hide the text
      });

      // When the user moves the camera away from the label
      exampleTarget.addEventListener("targetLost", event => {
        console.log("Target lost");
        overlay.style.display = "flex"; // Show the text again
      });
    </script>
  </body>
</html>
